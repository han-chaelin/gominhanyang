<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>온기우편함 미리보기</title>
  <link href="https://fonts.googleapis.com/css2?family=Gamja+Flower&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #cce5e7;
      font-family: 'Gamja Flower', sans-serif;
      display: flex;
      justify-content: center;
    }

    .wrapper {
      width: 100%;
      max-width: 480px;
      padding: 2rem 1rem;
      box-sizing: border-box;
    }

    .back-icon {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      cursor: pointer;
    }

    .note {
      position: relative;
      width: 100%;
      height: 200px;
      padding: 1.5rem;
      margin: 1.2rem auto;
      border-radius: 12px;
      box-shadow: 2px 4px 6px rgba(0,0,0,0.1);
      background-repeat: repeat-y;
      background-size: contain;
      background-position: center;
      line-height: 1.6;
      font-size: 1.2rem;
    }

    .note-yellow {
      background-color: #fdf4a6;
      background-image: repeating-linear-gradient(
        to bottom,
        #fdf4a6 0px,
        #fdf4a6 23px,
        #f7e98b 24px
      );
    }

    .note-pink {
      background-color: #ffd5d5;
      background-image: repeating-linear-gradient(
        to bottom,
        #ffd5d5 0px,
        #ffd5d5 23px,
        #f5bbbb 24px
      );
    }

    .note-date {
      font-weight: bold;
      margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="back-icon">←</div>

    <div class="note note-yellow">
      <div class="note-date">2025/04/21</div>
      편지 내용...
    </div>

    <div class="note note-pink">
      <div class="note-date">2025/04/22</div>
      답장 내용...
    </div>
  </div>
</body>
</html>
